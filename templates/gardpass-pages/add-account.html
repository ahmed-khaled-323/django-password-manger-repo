{% extends "base.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Entry | Vault</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* إضافات لتعديل النمط ليكون أكثر حداثة */
        .glass-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(180deg, rgba(20, 22, 30, 0.9) 0%, rgba(13, 14, 21, 0.95) 100%);
        }
        .input-group input {
            background: #1a1c25;
            border: 2px solid transparent;
        }
        .input-group input:focus {
            border-color: var(--accent-color);
            background: #1e202a;
        }
    </style>
</head>
{% block content %}
<body>
    <div class="glass-card">
        <header style="margin-bottom: 2rem;">
            <h2 style="color: var(--accent-color);">New Entry</h2>
            <p class="subtitle">Secure your credentials</p>
        </header>
        
        <form id="addAccountForm" method="post">
        {% csrf_token %}
            <div class="input-group">
                <input type="text" id="siteName" required placeholder=" " name='bio'>
                <label>Service Name</label>
            </div>
            <div class="input-group">
                <input type="text" id="email" required placeholder=" " name='gamil'>
                <label>Email / Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required placeholder=" " name='password'>
                <label>Password</label>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 2rem;">
                <button type="button" class="btn-primary" style="background: transparent; border: 1px solid var(--text-muted);" onclick="window.history.back()">Cancel</button>
                <button type="submit" class="btn-primary">Save Securely</button>
            </div>
        </form>
    </div>
</body>
</html>
{% endblock content %}
