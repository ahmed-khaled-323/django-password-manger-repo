
{% extends "base.html" %}
<title>Vault - login</title>
{% block content %}
    <div class="glass-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Secure your digital life</p>
        <form id="loginForm" method="post">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" id="username" required placeholder=" " name="username">
                <label for="username">Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required placeholder=" " name= "password">
                <label for="password">Password</label>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p class="switch-page">New here? <a href="/signup/">Create an account</a></p>
    </div>

{% endblock content %}
</html>
